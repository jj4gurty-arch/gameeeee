<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Catcher Deluxe</title>
<style>
  body { margin:0; overflow:hidden; background: linear-gradient(to bottom, #4facfe, #00f2fe); font-family: sans-serif; touch-action: none; }
  #score { position:absolute; top:10px; left:50%; transform:translateX(-50%); color:#fff; font-size:24px; font-weight:bold; z-index:10; }
  #gameCanvas { display:block; margin:0 auto; background:#3a3a3a; border:3px solid #fff; }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="gameCanvas" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let basket = { x:170, y:550, width:60, height:30, color:'#ff0' };
let fruits = [];
let score = 0;
let misses = 0;
let gameOver = false;
let powerUpActive = null;
let powerUpTimer = 0;
let confetti = [];
let secretEndingTriggered = false;

// Fruit colors
const fruitColors = ['#ff0000','#ffff00','#00ff00','#ff69b4'];

// Power-up types
const powerUps = ['double','slow'];

// Spawn a fruit
function spawnFruit() {
  let size = Math.random()*30 + 20;
  let x = Math.random()*(canvas.width - size);
  let color = fruitColors[Math.floor(Math.random()*fruitColors.length)];
  
  // 1% chance for secret fruit
  if(Math.random() < 0.01 && !secretEndingTriggered){
    color = '#00ffff'; // special cyan fruit
    fruits.push({x:x,y:-size,width:size,height:size,color:color,type:'secret'});
  } else if(Math.random() < 0.05){ // 5% chance power-up
    let type = powerUps[Math.floor(Math.random()*powerUps.length)];
    fruits.push({x:x,y:-size,width:size,height:size,color:color,type:'power',power:type});
  } else {
    fruits.push({x:x,y:-size,width:size,height:size,color:color,type:'normal'});
  }
}

// Draw game objects
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Draw basket
  ctx.fillStyle = basket.color;
  ctx.fillRect(basket.x, basket.y, basket.width, basket.height);

  // Draw fruits
  fruits.forEach(f=>{
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.arc(f.x + f.width/2, f.y + f.height/2, f.width/2, 0, Math.PI*2);
    ctx.fill();
  });

  // Draw confetti
  confetti.forEach(c=>{
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x, c.y, c.size, c.size);
  });
}

// Update game logic
function update() {
  let speed = 3;
  if(powerUpActive==='slow') speed = 1.5;
  fruits.forEach(f => f.y += speed);

  fruits.forEach((f,i)=>{
    // Catch
    if(f.y + f.height > basket.y &&
       f.x + f.width > basket.x &&
       f.x < basket.x + basket.width) {

      if(f.type==='normal') score += (powerUpActive==='double'?2:1);
      else if(f.type==='power'){
        powerUpActive = f.power;
        powerUpTimer = 500; // frames
      } else if(f.type==='secret'){
        secretEndingTriggered = true;
        gameOver = true; // trigger secret ending
      }

      // Spawn confetti
      for(let j=0;j<20;j++){
        confetti.push({x:f.x+Math.random()*f.width, y:f.y+Math.random()*f.height, size:Math.random()*5+2, color:`hsl(${Math.random()*360},100%,50%)`, vy:Math.random()*2+1});
      }

      fruits.splice(i,1);
    }
    // Missed
    else if(f.y > canvas.height){
      if(f.type==='normal') misses +=1;
      fruits.splice(i,1);
      if(misses >= 5) gameOver = true;
    }
  });

  // Update confetti
  confetti.forEach((c,i)=>{
    c.y += c.vy;
    if(c.y>canvas.height) confetti.splice(i,1);
  });

  // Power-up countdown
  if(powerUpActive){
    powerUpTimer--;
    if(powerUpTimer<=0) powerUpActive = null;
  }

  document.getElementById('score').textContent = "Score: "+score;
}

// Game loop
function loop() {
  if(!gameOver){
    update();
    draw();
    requestAnimationFrame(loop);
  } else {
    ctx.fillStyle = '#fff';
    ctx.font = '28px sans-serif';
    ctx.fillText(secretEndingTriggered ? 'SECRET ENDING! 🎉' : 'Game Over', 50, canvas.height/2);
    ctx.font = '20px sans-serif';
    ctx.fillText('Final Score: '+score, 110, canvas.height/2 + 40);
  }
}

// Touch controls
let touchX = null;
canvas.addEventListener('touchstart', e=>{ touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left; });
canvas.addEventListener('touchmove', e=>{ touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left; });
canvas.addEventListener('touchend', e=>{ touchX = null; });

// Move basket
function moveBasket() {
  if(touchX!==null){
    basket.x += (touchX - (basket.x + basket.width/2))*0.3;
    if(basket.x<0) basket.x=0;
    if(basket.x+basket.width>canvas.width) basket.x=canvas.width-basket.width;
  }
  requestAnimationFrame(moveBasket);
}

// Spawn fruits periodically, faster as score rises
setInterval(()=>{
  if(!gameOver) spawnFruit();
}, Math.max(400, 1000 - score*5));

// Start game
moveBasket();
loop();
</script>
</body>
</html>
